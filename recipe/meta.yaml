{% set name = "nbgitpuller" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0f3f0905959a47c6583d9991cd9812a98177d136b9abd670b4fc021404c4bce9

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - gitpuller = nbgitpuller.pull:main

requirements:
  host:
    - python
    - setuptools
    - pip
    - jupyter-packaging >=0.10
  run:
    - python
    - jupyter_server >=1.10.1
    - tornado

# Unable to tun tests, due to missing repohelpers -> https://pypi.org/project/repo-helper/
test:
  imports:
    - nbgitpuller
  commands:
    - pip check
    - gitpuller --help
  requires:
    - pip

about:
  home: https://github.com/jupyterhub/nbgitpuller
  description: One-way synchronization of git repositories to Jupyter servers
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Notebook Extension to do one-way synchronization of git repositories
  dev_url: https://github.com/jupyterhub/nbgitpuller
  doc_url: https://nbgitpuller.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
    - consideratio
